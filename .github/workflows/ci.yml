name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  migration-lint:
    name: Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for duplicate migration version numbers
        run: |
          DUPS=$(ls backend/db/migrations/*.up.sql \
                 | sed -E 's|.*/([0-9]+)_.*|\1|' \
                 | sort | uniq -d)
          if [ -n "$DUPS" ]; then
            echo "ERROR: duplicate migration version number(s) detected:"
            for v in $DUPS; do
              echo "  version $v:"
              ls backend/db/migrations/${v}_*.up.sql | sed 's|^|    |'
            done
            echo ""
            echo "golang-migrate refuses to start with duplicate versions."
            echo "Rename one of the conflicting migrations to a new, higher version."
            exit 1
          fi

      - name: Check every up.sql has a matching down.sql
        run: |
          MISSING=""
          for up in backend/db/migrations/*.up.sql; do
            down="${up%.up.sql}.down.sql"
            if [ ! -f "$down" ]; then
              MISSING="$MISSING $up"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: up migrations without matching down migration:"
            for m in $MISSING; do echo "  $m"; done
            exit 1
          fi

  migration-reversibility:
    name: Migration Reversibility
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_URL: postgres://test:test@localhost:5432/test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Install migrate CLI (v4.19.1 — match production Dockerfile)
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz \
            | tar xz
          sudo mv migrate /usr/local/bin/migrate
          migrate -version

      - name: migrate up (fresh DB)
        run: migrate -path backend/db/migrations -database "$DB_URL" up

      - name: migrate down -all (back to empty)
        run: migrate -path backend/db/migrations -database "$DB_URL" down -all

      - name: migrate up (re-apply all)
        run: migrate -path backend/db/migrations -database "$DB_URL" up

      - name: Assert expected version
        run: |
          EXPECTED=$(ls backend/db/migrations/*.up.sql \
                     | sed -E 's|.*/([0-9]+)_.*|\1|' \
                     | sort -n | tail -1 | sed 's/^0*//')
          ACTUAL=$(PGPASSWORD=test psql -h localhost -U test -d test -tAc \
                   "SELECT version FROM schema_migrations ORDER BY version DESC LIMIT 1")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "ERROR: schema_migrations.version=$ACTUAL but expected $EXPECTED"
            exit 1
          fi
          echo "OK: schema_migrations.version=$ACTUAL matches newest migration file"

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Run backend tests with coverage
        working-directory: ./backend
        run: go test -coverprofile=coverage.out ./...

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.out
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        working-directory: ./frontend
        run: bun run test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: E2E Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: bunx playwright install --with-deps chromium

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run E2E tests
        working-directory: ./frontend
        run: bun run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
