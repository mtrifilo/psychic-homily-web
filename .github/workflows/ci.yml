name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  migration-lint:
    name: Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for duplicate migration version numbers
        run: |
          DUPS=$(ls backend/db/migrations/*.up.sql \
                 | sed -E 's|.*/([0-9]+)_.*|\1|' \
                 | sort | uniq -d)
          if [ -n "$DUPS" ]; then
            echo "ERROR: duplicate migration version number(s) detected:"
            for v in $DUPS; do
              echo "  version $v:"
              ls backend/db/migrations/${v}_*.up.sql | sed 's|^|    |'
            done
            echo ""
            echo "golang-migrate refuses to start with duplicate versions."
            echo "Rename one of the conflicting migrations to a new, higher version."
            exit 1
          fi

      - name: Check every up.sql has a matching down.sql
        run: |
          MISSING=""
          for up in backend/db/migrations/*.up.sql; do
            down="${up%.up.sql}.down.sql"
            if [ ! -f "$down" ]; then
              MISSING="$MISSING $up"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: up migrations without matching down migration:"
            for m in $MISSING; do echo "  $m"; done
            exit 1
          fi

  migration-reversibility:
    name: Migration Reversibility
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_URL: postgres://test:test@localhost:5432/test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Install migrate CLI (v4.19.1 — match production Dockerfile)
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz \
            | tar xz
          sudo mv migrate /usr/local/bin/migrate
          migrate -version

      - name: migrate up (fresh DB)
        run: migrate -path backend/db/migrations -database "$DB_URL" up

      - name: migrate down -all (back to empty)
        run: migrate -path backend/db/migrations -database "$DB_URL" down -all

      - name: migrate up (re-apply all)
        run: migrate -path backend/db/migrations -database "$DB_URL" up

      - name: Assert expected version
        run: |
          EXPECTED=$(ls backend/db/migrations/*.up.sql \
                     | sed -E 's|.*/([0-9]+)_.*|\1|' \
                     | sort -n | tail -1 | sed 's/^0*//')
          ACTUAL=$(PGPASSWORD=test psql -h localhost -U test -d test -tAc \
                   "SELECT version FROM schema_migrations ORDER BY version DESC LIMIT 1")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "ERROR: schema_migrations.version=$ACTUAL but expected $EXPECTED"
            exit 1
          fi
          echo "OK: schema_migrations.version=$ACTUAL matches newest migration file"

      # PSY-413: `CREATE INDEX CONCURRENTLY` inside a multi-statement migration
      # silently fails (golang-migrate wraps multi-statement files in a
      # transaction, and CONCURRENTLY can't run in one). Our convention is
      # "one CONCURRENTLY statement per file" — see docs/strategy/migrations.md.
      # This step catches any future regression where the index stops being
      # created (e.g. if someone accidentally merges the CONCURRENTLY stmt
      # into a larger migration file). The `schema_migrations` assertion
      # above would still pass in that scenario because `IF NOT EXISTS`
      # swallows the error.
      - name: Assert CONCURRENTLY migration created its index
        run: |
          ACTUAL=$(PGPASSWORD=test psql -h localhost -U test -d test -tAc \
                   "SELECT indexname FROM pg_indexes WHERE indexname = 'idx_shows_duplicate_of_show_id';")
          if [ "$ACTUAL" != "idx_shows_duplicate_of_show_id" ]; then
            echo "ERROR: idx_shows_duplicate_of_show_id missing after migrate up"
            echo "Migration 000027 uses CREATE INDEX CONCURRENTLY. Check that the"
            echo "statement is the only statement in its migration file."
            exit 1
          fi
          echo "OK: CONCURRENTLY index idx_shows_duplicate_of_show_id exists"

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Run backend tests with coverage
        working-directory: ./backend
        run: go test -coverprofile=coverage.out ./...

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.out
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        working-directory: ./frontend
        run: bun run typecheck

      - name: Run unit tests with coverage
        working-directory: ./frontend
        run: bun run test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e-smoke:
    name: E2E Smoke (PR)
    # PSY-446: fast PR feedback. Runs only `@smoke`-tagged Playwright tests
    # in a single unsharded run (~17 tests) with a <3 min wall-clock budget.
    # Reuses the same global-setup as `e2e-tests` (Docker Postgres, migrations,
    # seed, backend). Branch-protection / required-check config is handled
    # outside this workflow.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Safety net against runaway flake; smoke is expected to finish in ~1–2 min.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: bunx playwright install --with-deps chromium

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run E2E smoke suite (@smoke)
        working-directory: ./frontend
        # `list` reporter gives concise CI output; `html` (written to disk,
        # never opened) gives a downloadable artifact on failure. 3 workers
        # matches CI default.
        run: bunx playwright test --grep @smoke --workers=3 --reporter=list,html
        env:
          CI: true
          PLAYWRIGHT_HTML_OPEN: never

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: frontend/playwright-report/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # PSY-418: split the full E2E suite across 4 parallel shards. Each shard
    # spins its own Docker stack + backend (via global-setup.ts) on an
    # isolated runner, so there's no cross-shard port / DB contention.
    # Shard count chosen from the PSY-417 baseline (93s test phase,
    # 372s cumulative test-time) — 4 shards roughly quarters the test phase.
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: bunx playwright install --with-deps chromium

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        working-directory: ./frontend
        run: bunx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: frontend/blob-report/
          retention-days: 1

  e2e-report:
    name: E2E Merged Report
    # Run after all shards finish, even if some failed — we still want the
    # merged report artifact for triage.
    if: ${{ !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        working-directory: ./frontend
        run: bunx playwright merge-reports --reporter html ../all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # PSY-411: post-merge CI failures on `main` used to silently go
  # unnoticed — the 000071 duplicate-migration collision lived on main
  # for 7 hours before anyone saw it. Branch protection gates PR-branch
  # CI, but the full E2E suite (sharded) only runs post-merge per
  # PSY-446's smoke/full split, so a merge-commit failure doesn't block
  # anything and doesn't page anyone.
  #
  # This job files a GitHub issue on any main-branch CI failure.
  # Dedupes against the commit SHA so rerun storms don't spam. No
  # external config — uses the built-in GITHUB_TOKEN.
  notify-main-failure:
    name: Notify on main CI failure
    # `always()` so this runs even when upstream `needs:` failed — the
    # whole point. Scoped to main-branch push events (not PRs).
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.migration-lint.result == 'failure' || needs.migration-reversibility.result == 'failure' || needs.backend-tests.result == 'failure' || needs.frontend-unit-tests.result == 'failure' || needs.e2e-tests.result == 'failure' || needs.e2e-report.result == 'failure') }}
    needs:
      - migration-lint
      - migration-reversibility
      - backend-tests
      - frontend-unit-tests
      - e2e-tests
      - e2e-report
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: File or dedupe tracking issue
        uses: actions/github-script@v7
        env:
          RES_MIGRATION_LINT: ${{ needs.migration-lint.result }}
          RES_MIGRATION_REVERSIBILITY: ${{ needs.migration-reversibility.result }}
          RES_BACKEND_TESTS: ${{ needs.backend-tests.result }}
          RES_FRONTEND_UNIT: ${{ needs.frontend-unit-tests.result }}
          RES_E2E_TESTS: ${{ needs.e2e-tests.result }}
          RES_E2E_REPORT: ${{ needs.e2e-report.result }}
        with:
          script: |
            const shortSha = context.sha.substring(0, 7)
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`

            // Dedupe: skip if an open `main-ci-failure` issue already
            // references this SHA. Catches retries of the same failing run.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'main-ci-failure',
              state: 'open',
              per_page: 50,
            })
            if (existing.some(i => i.title.includes(shortSha))) {
              core.info(`Open issue already references ${shortSha}; skipping.`)
              return
            }

            const results = {
              'Migration Lint': process.env.RES_MIGRATION_LINT,
              'Migration Reversibility': process.env.RES_MIGRATION_REVERSIBILITY,
              'Backend Tests': process.env.RES_BACKEND_TESTS,
              'Frontend Unit Tests': process.env.RES_FRONTEND_UNIT,
              'E2E Tests (sharded)': process.env.RES_E2E_TESTS,
              'E2E Merged Report': process.env.RES_E2E_REPORT,
            }
            const failed = Object.entries(results)
              .filter(([_, r]) => r === 'failure')
              .map(([name]) => name)

            // Fetch commit metadata for author + subject. Nice-to-have —
            // file the issue even if this call fails.
            let authorLine = ''
            let commitSubject = shortSha
            try {
              const { data: commit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
              })
              commitSubject = commit.commit.message.split('\n')[0]
              const login = commit.author && commit.author.login
              authorLine = login
                ? `Triggered by: @${login}`
                : `Commit author: ${commit.commit.author.name}`
            } catch (err) {
              core.warning(`Failed to fetch commit metadata: ${err.message}`)
            }

            const title = `Main CI failed: ${commitSubject.slice(0, 80)} (${shortSha})`
            const body = [
              `Post-merge CI on \`main\` failed.`,
              '',
              `**Failing jobs:** ${failed.join(', ') || '(none reported as "failure"; check the run directly)'}`,
              `**Run:** ${runUrl}`,
              `**Commit:** ${commitUrl}`,
              authorLine,
              '',
              '---',
              '',
              'Filed automatically by the `notify-main-failure` job (PSY-411). Close once the root cause is understood (revert, hotfix, or flake). A new issue will file automatically on the next failing run against a different commit.',
            ].filter(Boolean).join('\n')

            const { data: created } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['main-ci-failure'],
            })
            core.info(`Filed issue #${created.number}: ${created.html_url}`)
