name: Lighthouse Explore

# PSY-839: perf gate on /explore against the budget locked in
# docs/open-questions/explore-landing.md §"Performance Budget +
# Lazy-Mount Strategy":
#   * LCP  < 2.0s
#   * TTI  < 2.5s
#   * CLS  < 0.1
# Mobile profile (Moto G4 emulation + slow-4G throttling) per the
# lighthouserc.json config at repo root.
#
# Path-filtered to PR events that touch /explore or any of its
# load-bearing primitives. Unrelated PRs skip the job entirely
# (no false-positive failures, no wasted runner minutes). The job is
# NOT yet a required check — branch protection wiring is out of scope
# for PSY-839; the wiring decision waits on the first ~5 runs to
# establish budget headroom.

on:
  pull_request:
    branches: [main]
    paths:
      # The route itself.
      - frontend/app/explore/**
      # The feature module composing /explore.
      - frontend/features/explore/**
      # ForceGraphView — InlineGraph mounts it; perf-sensitive.
      - frontend/components/graph/**
      # Card primitive — used throughout /explore.
      - frontend/components/ui/card.tsx
      # SidebarLayout — /explore renders inside its chrome, and a
      # regression there (e.g. unsplit JS bundle) shows up as TTI loss.
      - frontend/components/layout/Sidebar.tsx
      - frontend/components/layout/SidebarLayout.tsx
      # Next.js config tweaks (cacheComponents, bundle analyzer,
      # headers) can move LCP/TTI in either direction; rerun the gate.
      - frontend/next.config.ts
      # The Lighthouse config + this workflow itself — so changes to
      # budgets / preset / paths re-validate on the same PR.
      - lighthouserc.json
      - .github/workflows/lighthouse-explore.yml
      #
      # Intentionally NOT in the filter — these are transitive deps
      # whose perf footprint already spans the whole app (changes
      # there get caught by the broader E2E / visual suite):
      #   * frontend/lib/queryClient.ts, lib/api-base.ts, lib/utils/*
      #   * frontend/features/shows/**, features/artists/**
      # If a regression in those areas materializes on /explore later,
      # widen the filter rather than fix it after the fact.

jobs:
  lighthouse:
    name: Lighthouse /explore (mobile)
    runs-on: ubuntu-latest
    # Vercel preview waits can be slow (cold builds peak at ~3min);
    # Lighthouse itself adds ~1min per run × 3 runs. Job ceiling is
    # the wait timeout (10min) + lhci runtime (~5min) + slack for
    # cold action setup. Set explicitly above the sum so an unlucky
    # cold-build PR doesn't get SIGKILL'd before lhci can report.
    timeout-minutes: 20
    # `wait-for-vercel-preview` reads deployment statuses via the GH
    # API; default GITHUB_TOKEN permissions cover this. No write
    # permissions required — Lighthouse uploads to
    # temporary-public-storage, not a self-hosted LHCI server.
    permissions:
      contents: read
      deployments: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      # Wait for Vercel to mark the PR's preview deployment as
      # READY. Polls GitHub's deployment-statuses API; bails out
      # after max_timeout. 10min covers cold Turbopack builds.
      - name: Wait for Vercel preview deployment
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          # Vercel posts the preview against the "Preview"
          # environment. Leaving this unset matches any environment,
          # but pinning it avoids racing against a stale prod
          # deployment status.
          environment: Preview

      # Run Lighthouse against the preview's /explore route. 3 runs
      # with median aggregation per lighthouserc.json — single-run
      # values are too noisy for hard assertions. The action installs
      # @lhci/cli internally; no local package.json wiring needed
      # for the CI path. (Local runs use the devDependency.)
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.vercel-preview.outputs.url }}/explore
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
